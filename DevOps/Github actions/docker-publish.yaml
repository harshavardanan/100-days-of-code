# .github/workflows/docker-publish.yml

name: Build and Push to Docker Hub

# when to trigger this workflow
on:
  push:
    branches:
      - main # only runs when you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # GitHub spins up a fresh Ubuntu machine

    steps:
      # Step 1 — checkout your code onto the Ubuntu machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 — log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3 — build the image and push it
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:latest
